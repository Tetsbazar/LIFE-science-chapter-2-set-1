<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Bazar — জীবন বিজ্ঞান | দ্বিতীয় অধ্যায় | Set 1</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Syne',sans-serif;background:#f0faf4;min-height:100vh;color:#1c2e24}
.top-bar{background:#1a7a4a;padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.top-logo{font-size:1.1rem;font-weight:800;color:white}.top-logo span{color:#f9a825}
.timer-box{background:rgba(255,255,255,0.15);border-radius:8px;padding:0.4rem 1rem;display:flex;align-items:center;gap:6px;font-size:1rem;font-weight:700;color:white}
.timer-box.danger{background:#dc3545}
.main-container{max-width:750px;margin:2rem auto;padding:0 1rem}
.set-header{background:white;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #c5dccb;box-shadow:0 4px 6px rgba(0,0,0,0.02)}
.set-header h1{font-family:'Tiro Bangla',serif;font-size:1.6rem;color:#1a7a4a;margin-bottom:0.4rem}
.set-header p{font-size:0.95rem;color:#5a7a66;font-weight:600}
.question-card{background:white;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #c5dccb;box-shadow:0 4px 6px rgba(0,0,0,0.02)}
.q-title{font-size:1.1rem;font-weight:700;margin-bottom:1.2rem;line-height:1.5;color:#0f1a14}
.opts-grid{display:flex;flex-direction:column;gap:10px}
.opt{width:100%;background:#f8fdf9;border:1px solid #c5dccb;border-radius:8px;padding:0.9rem 1.2rem;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;font-size:0.95rem;font-weight:500;transition:all 0.3s}
.opt:hover{background:#e8f7ef;border-color:#2aad68}
.opt input{display:none}
.opt-circle{width:26px;height:26px;border-radius:50%;border:2px solid #c5dccb;background:white;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;color:#5a7a66;flex-shrink:0}
.opt:hover .opt-circle{border-color:#2aad68;color:#2aad68}
.opt.selected{background:#e8f7ef;border-color:#1a7a4a}
.opt.selected .opt-circle{background:#1a7a4a;border-color:#1a7a4a;color:white}
.opt.correct-ans{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20}
.opt.correct-ans .opt-circle{background:#2e7d32;border-color:#2e7d32;color:white}
.opt.wrong-ans{background:#ffebee;border-color:#c62828;color:#c62828}
.opt.wrong-ans .opt-circle{background:#c62828;border-color:#c62828;color:white}
.opt.disabled{pointer-events:none;cursor:default}
.explanation-box{display:none;margin-top:1.2rem;padding:1rem;background:#f4fbf6;border-left:4px solid #1a7a4a;border-radius:4px;font-size:0.92rem;line-height:1.6;color:#2a4a36}
.submit-area{margin-top:2rem;text-align:center}
.submit-btn{background:#1a7a4a;color:white;border:none;border-radius:8px;padding:1rem 2.5rem;font-size:1.1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(26,122,74,0.25);transition:all 0.3s}
.submit-btn:hover{background:#135939;transform:translateY(-1px)}
.submit-btn:disabled{background:#a3cfb9;cursor:not-allowed;box-shadow:none;transform:none}
.result-box{display:none;background:#e8f7ef;border:2px dashed #1a7a4a;border-radius:12px;padding:2rem;text-align:center;margin-bottom:2rem}
.result-box h2{font-size:1.8rem;color:#1a7a4a;margin-bottom:0.5rem}
.result-box p{font-size:1.1rem;font-weight:600;color:#5a7a66}
</style>
</head>
<body>

<div class="top-bar">
    <div class="top-logo">Test<span>Bazar</span></div>
    <div class="timer-box" id="timerBox">⏱️ 10:00</div>
</div>

<div class="main-container">
    <div class="set-header">
        <h1>দ্বিতীয় অধ্যায়: জীবনের প্রবাহমানতা</h1>
        <p>প্র্যাকটিস সেট - ১ (কোশ বিভাজন এবং কোশ চক্র)</p>
    </div>

    <div class="result-box" id="resultBox">
        <h2>পরীক্ষার ফলাফল</h2>
        <p id="scoreText"></p>
    </div>

    <form id="quizForm">
        <div id="questionsContainer"></div>
        <div class="submit-area">
            <button type="button" class="submit-btn" id="submitBtn" onclick="submitQuiz()">খাতা জমা দিন (Submit)</button>
        </div>
    </form>
</div>

<script>
const questions = [
{"q": "১. 'ক্রোমোজোম' শব্দটি প্রথম কে প্রবর্তন করেন?", "opts": ["গ্রেগর জোহান মেন্ডেল", "হেনরিখ ওয়ালডেয়ার", "উইলিয়াম স্ট্র্যাসবার্গার", "রবার্ট হুক"], "ans": 1, "exp": "হেনরিখ ওয়ালডেয়ার (Heinrich Waldeyer) ১৮৯০ সালে 'ক্রোমোজোম' শব্দ প্রবর্তন করেন।"},
{"q": "२. সাধারণ মানুষের কোশে কয়টি ক্রোমোজোম থাকে?", "opts": ["২২ টি", "२३ টি", "४६ টি", "९२ টি"], "ans": 2, "exp": "মানুষের সোমাটিক কোশে २३ জোড়া অর্থাৎ ४६ টি ক্রোমোজোম থাকে।"},
{"q": "३. মাইটোসিস কোশ বিভাজনে কয়টি পর্যায় আছে?", "opts": ["२টি", "३টি", "४টি", "५টি"], "ans": 2, "exp": "মাইটোসিসে ४টি পর্যায় থাকে: প্রফেজ, মেটাফেজ, অ্যানাফেজ এবং টেলোফেজ।"},
{"q": "४. নিউক্লিয়াস যে পর্যায়ে দুটি অংশে বিভক্ত হয় তাকে কী বলে?", "opts": ["সাইটোকাইনেসিস", "কেরিওকাইনেসিস", "মিয়োসিস", "অ্যামাইটোসিস"], "ans": 1, "exp": "কেরিওকাইনেসিস হল নিউক্লিয়াসের বিভাজন প্রক্রিয়া।"},
{"q": "५. কোশ চক্রের কোন পর্যায়ে DNA প্রতিলিপি হয়?", "opts": ["G१ পর্যায়", "S পর্যায়", "G२ পর্যায়", "M পর্যায়"], "ans": 1, "exp": "DNA প্রতিলিপি S (Synthesis) পর্যায়ে ঘটে।"},
{"q": "६. স্পিন্ডেল তন্তু কিসের সমন্বয়ে তৈরি?", "opts": ["নিউক্লিওপ্রোটিন", "মাইক্রোটিউবিউলস", "অ্যাক্টিন", "কোলাজেন"], "ans": 1, "exp": "স্পিন্ডেল তন্তু মাইক্রোটিউবিউলসের সমন্বয়ে গঠিত।"},
{"q": "७. প্রফেজের সময় ক্রোমোজোম কোথায় সংগঠিত হয়?", "opts": ["নিউক্লিয়াসে", "কোশের মেরুতে", "কোশের কেন্দ্রে", "সাইটোপ্লাজমে"], "ans": 0, "exp": "প্রফেজে ক্রোমোজোম নিউক্লিয়াসে সংগঠিত হয় এবং ঘন হয়ে ওঠে।"},
{"q": "८. মেটাফেজে ক্রোমোজোমগুলি কোথায় সংযুক্ত থাকে?", "opts": ["নিউক্লিয়াস মেমব্রেনে", "সেন্ট্রোমিয়ার থেকে স্পিন্ডেলে", "সরাসরি স্পিন্ডেল মেরুতে", "সাইটোপ্লাজমে"], "ans": 1, "exp": "মেটাফেজে ক্রোমোজোমের সেন্ট্রোমিয়ার স্পিন্ডেল বিষুবরেখায় সংযুক্ত থাকে।"},
{"q": "९. অ্যানাফেজে ক্রোমোজোমের কী ঘটে?", "opts": ["এক থাকে", "दुई অংশে বিভক্ত হয়", "तीन অংশে বিভক्त হয়", "घোরে"], "ans": 1, "exp": "অ্যানাফেজে সিস্টার ক্রোমাটিড আলাদা হয়ে কোশের বিপরীত মেরুতে চলে যায়।"},
{"q": "१०. মিয়োসিস বিভাজন কীভাবে সম্পন্ন হয়?", "opts": ["একবার", "दुईबार", "तीनबार", "चारबार"], "ans": 1, "exp": "মিয়োসিস दुई টি ক्रमिक बिभाजनের মাধ्যমে सम्पन्न हয়: मियोসिस-I और मियोसिस-II।"},
{"q": "११. আমাইটোসিস কোন ধরনের কোশে পাওয়া যায়?", "opts": ["যুব কোশ", "রক्त कोश", "স्नायु कोश", "पुरातन कोश"], "ans": 3, "exp": "आमाइटोसिस (सरासरी नियुक्लियस बिभाजन) पुरातन और अवक्षयीय कोशे पाওয়া যाय।"},
{"q": "१२. কোশ চক্রের মোট সময়কাল সাধারণত কত?", "opts": ["१ घंटा", "६ घंटा", "१२ घंटा", "२४ घंटा"], "ans": 3, "exp": "एकटি मानव कोশের सम्पूर्ण कोश चक्र साधारणत २०-३० घंटा समय नेय।"},
{"q": "१३. টেলোফেজে নিউক্লিয়াস মেমব্রেন কোথা থেকে উদ्ভূত হয়?", "opts": ["स्पिन्डेल थेकै", "सेन्ट्रिओल थेकै", "ER থेকে", "गोल्जि थেকै"], "ans": 2, "exp": "टेलोफेजे नुতन नियुक्लियस मेमब्रेन बिद्यमान एन्डोप्लाज्मिक रेटिकुलम थेकै पुनर्गठित हय।"},
{"q": "१४. কোশ চক্র নিয়ন्त्रণকारী প্রোটিন কাকে বলে?", "opts": ["এনজাইম", "अन्टिबडि", "साइक्लिन", "होर्मन"], "ans": 2, "exp": "साइक्लिन प्रोटिन कोश चक्रের विभिन्न पर्याय नियन्त्रण करे।"},
{"q": "१५. ক্যাফিন কোন পর্যায়ে কোশ বিভাজন বাধা দেয়?", "opts": ["G१ पर्याय", "S पर्याय", "G२ पर्याय", "M पर्याय"], "ans": 3, "exp": "ক্যাফিন साधारणत माइटोसिसे M पर्यायै बिभाजन बाधा देय र दभिगुण नियुक्लियसबिशिष्ट कोश तैरि करे।"}
];

const LABELS = ['ক', 'খ', 'গ', 'ঘ'];
let timeLeft = 600;
let timerInterval;

function initQuiz() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    
    questions.forEach((q, qIdx) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `qCard_${qIdx}`;
        
        let optsHtml = '';
        q.opts.forEach((opt, oIdx) => {
            optsHtml += `<button type="button" class="opt" id="opt_${qIdx}_${oIdx}" onclick="selectOption(${qIdx}, ${oIdx})"><div class="opt-circle">${LABELS[oIdx]}</div><div class="opt-text">${opt}</div></button>`;
        });
        
        card.innerHTML = `<div class="q-title"><strong>${q.q}</strong></div><div class="opts-grid">${optsHtml}</div><div class="explanation-box" id="exp_${qIdx}"><strong>💡 ব্যাখ্যা:</strong> ${q.exp}</div>`;
        container.appendChild(card);
    });
    
    startTimer();
}

let userAnswers = new Array(questions.length).fill(null);

function selectOption(qIdx, oIdx) {
    userAnswers[qIdx] = oIdx;
    for(let i=0; i<4; i++) {
        const btn = document.getElementById(`opt_${qIdx}_${i}`);
        if(i === oIdx) btn.classList.add('selected');
        else btn.classList.remove('selected');
    }
}

function startTimer() {
    timerInterval = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            submitQuiz();
        } else {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            const timerBox = document.getElementById('timerBox');
            timerBox.textContent = `⏱️ ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(timeLeft <= 60) timerBox.classList.add('danger');
        }
    }, 1000);
}

function submitQuiz() {
    clearInterval(timerInterval);
    document.getElementById('submitBtn').disabled = true;
    
    let score = 0;
    questions.forEach((q, qIdx) => {
        const selected = userAnswers[qIdx];
        const correct = q.ans;
        for(let i=0; i<4; i++) {
            const btn = document.getElementById(`opt_${qIdx}_${i}`);
            btn.classList.add('disabled');
            if(i === correct) {
                btn.classList.remove('selected');
                btn.classList.add('correct-ans');
            }
            if(selected === i && selected !== correct) {
                btn.classList.remove('selected');
                btn.classList.add('wrong-ans');
            }
        }
        if(selected === correct) score++;
        document.getElementById(`exp_${qIdx}`).style.display = 'block';
    });
    
    document.getElementById('scoreText').innerHTML = `আপনার মোট স্কোর: <strong>${score} / ${questions.length}</strong>`;
    document.getElementById('resultBox').style.display = 'block';
    window.scrollTo({top: 0, behavior: 'smooth'});
}

window.onload = initQuiz;
</script>
</body>
</html>
